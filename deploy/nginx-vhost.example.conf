# Пример vhost-конфига для СИСТЕМНОГО nginx на сервере (НЕ для docker-compose).
# Кладётся рядом с конфигами остальных доменов, например:
#   /etc/nginx/sites-available/nosmoke.example.com.conf
#   ln -s ../sites-available/nosmoke.example.com.conf /etc/nginx/sites-enabled/
#
# Перед первым запуском certbot этот файл должен содержать только http-блок
# (см. ниже), чтобы прошла HTTP-01 валидация. После `certbot --nginx -d ...`
# certbot сам допишет server{} на 443 с ssl_certificate — можно не трогать руками.

server {
    listen 80;
    listen [::]:80;
    server_name nosmoke.example.com; # замените на реальный домен

    # понадобится certbot'у для HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot; # или стандартный webroot, который уже используется на сервере
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Этот блок добавит/поправит certbot после выпуска сертификата.
# Если TLS уже терминируется где-то централизованно (например, отдельным
# Traefik/Caddy) — вместо этого просто заведите проксирование на порт,
# указанный ниже, тем способом, который принят для остальных доменов на сервере.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nosmoke.example.com; # замените на реальный домен

    # ssl_certificate / ssl_certificate_key пропишет certbot

    # Порт должен совпадать с HTTP_PORT в .env этого проекта (по умолчанию 8010)
    # и не пересекаться с портами других ваших ботов/сайтов на сервере.
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
